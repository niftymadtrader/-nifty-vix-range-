<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nifty VIX Range — Live</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #06080e;
  color: #e6edf3;
  font-family: 'Outfit', sans-serif;
  height: 100vh;
  overflow: hidden;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-bottom: 1px solid #1c2432;
}
.header h1 {
  font-size: 15px; font-weight: 700;
  background: linear-gradient(135deg, #f7b731, #ff9f43);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hdr-right {
  display: flex; gap: 20px; align-items: center;
  font-family: 'DM Mono', monospace; font-size: 12px;
}
.hdr-right .lbl { color: #484f58; }
.hdr-right .spot { color: #fff; font-weight: 600; font-size: 14px; }
.hdr-right .vix { color: #fc5c65; font-weight: 500; }
.hdr-right .dte { color: #f7b731; font-weight: 500; }
.hdr-right .chg-up { color: #26de81; font-size: 11px; }
.hdr-right .chg-dn { color: #fc5c65; font-size: 11px; }
.live-dot {
  display: inline-block; width: 7px; height: 7px; border-radius: 50%;
  background: #26de81; margin-right: 4px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
.live-tag { color: #26de81; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; }

.chart-wrap {
  position: relative;
  height: calc(100vh - 46px);
  padding: 4px 8px 2px 8px;
}

/* Login screen */
.center-box { display:flex; align-items:center; justify-content:center; height:calc(100vh - 46px); }
.login-card {
  background: #0d1117; border: 1px solid #1c2432; border-radius: 16px;
  padding: 36px; text-align: center; max-width: 480px;
}
.login-card h2 { color: #f7b731; margin-bottom: 10px; font-family: 'DM Mono', monospace; font-size: 16px; }
.login-card p { color: #7d8590; font-family: 'DM Mono', monospace; font-size: 11px; line-height: 2; }
.login-card a.btn {
  display:inline-block; margin:14px 0; padding:10px 26px;
  background:linear-gradient(135deg,#f7b731,#ff9f43);
  color:#000; font-family:'DM Mono',monospace; font-weight:600;
  border-radius:8px; text-decoration:none; font-size:12px;
}
.login-card input {
  background:#080c14; border:1px solid #1c2432; border-radius:8px;
  color:#e6edf3; font-family:'DM Mono',monospace; padding:8px 12px;
  width:240px; text-align:center; font-size:12px;
}
.login-card button {
  margin-left:6px; padding:8px 16px; background:#26de81; color:#000;
  border:none; border-radius:8px; font-family:'DM Mono',monospace; font-weight:600; cursor:pointer;
}
.login-card .manual-btn {
  margin-top:14px; padding:7px 16px; background:#131922; color:#e6edf3;
  border:1px solid #1c2432; border-radius:8px; font-family:'DM Mono',monospace; cursor:pointer; font-size:11px;
}

/* Loading */
.loading { display:flex; align-items:center; justify-content:center; height:calc(100vh - 46px); flex-direction:column; gap:16px; }
.spinner {
  width:36px; height:36px; border:3px solid #1c2432;
  border-top-color:#f7b731; border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading span { font-family:'DM Mono',monospace; font-size:12px; color:#484f58; }
</style>
</head>
<body>

<div class="header">
  <h1>NIFTY VIX RANGE</h1>
  <div class="hdr-right">
    <span class="live-tag"><span class="live-dot"></span>LIVE</span>
    <span><span class="lbl">NIFTY </span><span class="spot" id="hSpot">—</span> <span id="hChg"></span></span>
    <span><span class="lbl">VIX </span><span class="vix" id="hVix">—</span></span>
    <span><span class="lbl">DTE </span><span class="dte" id="hDte">—</span></span>
  </div>
</div>

<div id="app">
  <div class="loading"><div class="spinner"></div><span>Connecting to market feed...</span></div>
</div>

<script>
// ===========================
// CONFIG
// ===========================
const API_URL = '/api/range';
const MAX_POINTS = 3600; // 1hr of 1-sec ticks

let chartData = {
  labels: [], spot: [],
  sd1U: [], sd1L: [],
  sd2U: [], sd2L: [],
  sd3U: [], sd3L: [],
};
let rangeChart = null;
let MANUAL_MODE = false;
let manualData = { nifty: 24780.50, vix: 21.14, dte: 27 };

// ===========================
// FETCH
// ===========================
async function fetchData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    if (res.status === 401 || !data.success) {
      if (data.loginUrl) { showLogin(); return null; }
      throw new Error(data.error);
    }
    return data;
  } catch (err) {
    MANUAL_MODE = true;
    return calculateManual(manualData.nifty, manualData.vix, manualData.dte);
  }
}

function showLogin() {
  document.getElementById('app').innerHTML = `
    <div class="center-box"><div class="login-card">
      <div style="font-size:36px;margin-bottom:10px;">🔐</div>
      <h2>Upstox Login Required</h2>
      <p>1. Click Login → 2. Login to Upstox → 3. Copy code → 4. Paste below</p>
      <a class="btn" href="/login">🔐 LOGIN</a>
      <div style="margin-top:14px;">
        <input type="text" id="auth-code" placeholder="Paste auth code">
        <button onclick="submitCode()">SUBMIT</button>
      </div>
      <div style="margin-top:16px;border-top:1px solid #1c2432;padding-top:14px;">
        <button class="manual-btn" onclick="goManual()">⚡ MANUAL MODE</button>
      </div>
    </div></div>`;
}

function submitCode() {
  const c = document.getElementById('auth-code').value.trim();
  if (c) window.location.href = '/auth?code=' + c;
}

function goManual() {
  MANUAL_MODE = true;
  showChart();
  processData(calculateManual(manualData.nifty, manualData.vix, manualData.dte));
}

function calculateManual(nifty, vix, dte) {
  const av = vix / 100, tf = Math.sqrt(dte / 365);
  const m1 = nifty * av * tf, m2 = m1 * 2, m3 = m1 * 3;
  return {
    success: true, timestamp: new Date().toISOString(), manual: true,
    market: { nifty, change: 0, pctChange: 0, vix, vixChange: 0 },
    config: { dte },
    ranges: {
      daily: { points: 0 },
      sd1: { points: +m1.toFixed(2), upper: +(nifty+m1).toFixed(2), lower: +(nifty-m1).toFixed(2), lowerStrike: 0, upperStrike: 0, prob: 68.27 },
      sd2: { points: +m2.toFixed(2), upper: +(nifty+m2).toFixed(2), lower: +(nifty-m2).toFixed(2), lowerStrike: 0, upperStrike: 0, prob: 95.45 },
      sd3: { points: +m3.toFixed(2), upper: +(nifty+m3).toFixed(2), lower: +(nifty-m3).toFixed(2), lowerStrike: 0, upperStrike: 0, prob: 99.73 },
    },
  };
}

// ===========================
// SHOW CHART CONTAINER
// ===========================
function showChart() {
  document.getElementById('app').innerHTML = '<div class="chart-wrap"><canvas id="rangeChart"></canvas></div>';
}

// ===========================
// PROCESS DATA & UPDATE CHART
// ===========================
const fmtIN = n => Number(n).toLocaleString('en-IN', { maximumFractionDigits: 1 });

function processData(d) {
  const now = new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });

  chartData.labels.push(now);
  chartData.spot.push(d.market.nifty);
  chartData.sd1U.push(d.ranges.sd1.upper);
  chartData.sd1L.push(d.ranges.sd1.lower);
  chartData.sd2U.push(d.ranges.sd2.upper);
  chartData.sd2L.push(d.ranges.sd2.lower);
  chartData.sd3U.push(d.ranges.sd3.upper);
  chartData.sd3L.push(d.ranges.sd3.lower);

  if (chartData.labels.length > MAX_POINTS) {
    Object.keys(chartData).forEach(k => chartData[k].shift());
  }

  // Header update
  document.getElementById('hSpot').textContent = fmtIN(d.market.nifty);
  const chgEl = document.getElementById('hChg');
  const isUp = d.market.pctChange >= 0;
  chgEl.className = isUp ? 'chg-up' : 'chg-dn';
  chgEl.textContent = `${isUp ? '▲' : '▼'} ${Math.abs(d.market.change).toFixed(1)} (${d.market.pctChange >= 0 ? '+' : ''}${d.market.pctChange}%)`;
  document.getElementById('hVix').textContent = Number(d.market.vix).toFixed(2);
  document.getElementById('hDte').textContent = d.config.dte;

  updateChart();
}

function updateChart() {
  const ctx = document.getElementById('rangeChart');
  if (!ctx) return;

  if (rangeChart) {
    rangeChart.data.labels = chartData.labels;
    rangeChart.data.datasets[0].data = chartData.spot;
    rangeChart.data.datasets[1].data = chartData.sd1U;
    rangeChart.data.datasets[2].data = chartData.sd1L;
    rangeChart.data.datasets[3].data = chartData.sd2U;
    rangeChart.data.datasets[4].data = chartData.sd2L;
    rangeChart.data.datasets[5].data = chartData.sd3U;
    rangeChart.data.datasets[6].data = chartData.sd3L;
    rangeChart.update('none');
    return;
  }

  const mkLine = (label, color, width, dash, fillTarget, fillColor) => ({
    label, data: [], borderColor: color, borderWidth: width,
    borderDash: dash || [], pointRadius: 0, tension: 0.15,
    fill: fillTarget || false,
    backgroundColor: fillColor || 'transparent',
  });

  rangeChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: chartData.labels,
      datasets: [
        { ...mkLine('NIFTY SPOT', '#ffffff', 2), data: chartData.spot },
        { ...mkLine('1σ Upper', '#fc5c65', 1.5, [6,3]), data: chartData.sd1U },
        { ...mkLine('1σ Lower', '#26de81', 1.5, [6,3], '-1', 'rgba(252,92,101,0.05)'), data: chartData.sd1L },
        { ...mkLine('2σ Upper', '#45aaf2', 1, [4,4]), data: chartData.sd2U },
        { ...mkLine('2σ Lower', '#45aaf2', 1, [4,4], '-1', 'rgba(69,170,242,0.04)'), data: chartData.sd2L },
        { ...mkLine('3σ Upper', '#a55eea', 0.8, [2,5]), data: chartData.sd3U },
        { ...mkLine('3σ Lower', '#a55eea', 0.8, [2,5], '-1', 'rgba(165,94,234,0.03)'), data: chartData.sd3L },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top', align: 'end',
          labels: {
            color: '#7d8590', font: { family: 'DM Mono', size: 10 },
            usePointStyle: true, pointStyle: 'line', padding: 12,
            filter: (item) => !item.text.includes('Lower'), // show only Upper labels to avoid duplication
          }
        },
        tooltip: {
          backgroundColor: '#0d1117ee', borderColor: '#1c2432', borderWidth: 1,
          titleFont: { family: 'DM Mono', size: 11 },
          bodyFont: { family: 'DM Mono', size: 11 },
          callbacks: {
            label: ctx => ' ' + ctx.dataset.label + ': ' + fmtIN(ctx.parsed.y)
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#484f58', font: { family: 'DM Mono', size: 9 }, maxTicksLimit: 12, maxRotation: 0 },
          grid: { color: '#1c243212' }
        },
        y: {
          position: 'right',
          ticks: {
            color: '#7d8590', font: { family: 'DM Mono', size: 10 },
            callback: v => Number(v).toLocaleString('en-IN', { maximumFractionDigits: 0 })
          },
          grid: { color: '#1c243225' }
        }
      }
    }
  });
}

// ===========================
// SSE LIVE STREAM (every tick)
// ===========================
function startLiveStream() {
  const evtSource = new EventSource('/api/stream');

  evtSource.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.success) processData(data);
    } catch (err) {
      console.log('Stream parse error:', err);
    }
  };

  evtSource.onerror = () => console.log('Stream disconnected, auto-retrying...');
}

// ===========================
// INIT
// ===========================
async function init() {
  const data = await fetchData();
  if (!data) return;
  showChart();
  processData(data);
  startLiveStream();
}

init();
</script>
</body>
</html>
