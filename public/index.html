<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nifty VIX Range — Live</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #e0e0e0;
  font-family: 'Inter', sans-serif;
}

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px;
  border-bottom: 1px solid #1e1e2e;
  background: #0e0e16;
}
.topbar h1 { font-size: 18px; font-weight: 700; color: #f0f0f0; }
.topbar-right {
  display: flex; gap: 28px; align-items: center;
  font-family: 'DM Mono', monospace; font-size: 13px;
}
.topbar-right .lbl { color: #555; font-size: 11px; margin-right: 4px; }
.topbar-right .spot-val { color: #fff; font-weight: 600; font-size: 16px; }
.topbar-right .vix-val { color: #ff6b6b; font-weight: 600; }
.topbar-right .dte-val { color: #ffd43b; font-weight: 600; }
.chg-up { color: #51cf66; font-size: 12px; font-weight: 500; }
.chg-dn { color: #ff6b6b; font-size: 12px; font-weight: 500; }
.live-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: #0d2818; border: 1px solid #1a4a2a; border-radius: 20px;
  padding: 4px 12px; font-size: 11px; color: #51cf66; font-weight: 600;
}
.live-badge .dot {
  width: 6px; height: 6px; border-radius: 50%; background: #51cf66;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

.info-strip {
  display: flex; gap: 24px; padding: 10px 28px;
  border-bottom: 1px solid #1a1a28;
  background: #0c0c14;
  font-family: 'DM Mono', monospace; font-size: 11px; color: #666;
}

.chart-container {
  position: relative;
  width: 100%;
  height: calc(100vh - 110px);
  padding: 12px 16px 8px 8px;
  background: #0a0a0f;
}

/* Hover info box (fixed top-left inside chart) */
.hover-info {
  position: absolute;
  top: 20px; left: 24px;
  background: #12121cee;
  border: 1px solid #2a2a3a;
  border-radius: 8px;
  padding: 12px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  z-index: 10;
  pointer-events: none;
  display: none;
  min-width: 200px;
  line-height: 1.8;
}
.hover-info .hi-time { color: #888; font-size: 10px; margin-bottom: 4px; }
.hover-info .hi-row { display: flex; justify-content: space-between; gap: 16px; }
.hover-info .hi-label { color: #777; }
.hover-info .hi-val { font-weight: 500; }

.center-box { display:flex; align-items:center; justify-content:center; height:calc(100vh - 110px); }
.login-card {
  background:#12121c; border:1px solid #1e1e2e; border-radius:12px;
  padding:40px; text-align:center; max-width:460px;
}
.login-card h2 { color:#f0f0f0; margin-bottom:10px; font-size:18px; }
.login-card p { color:#777; font-size:13px; line-height:1.9; }
.login-card a.btn {
  display:inline-block; margin:16px 0; padding:10px 28px;
  background:#7c3aed; color:#fff; font-weight:600;
  border-radius:8px; text-decoration:none; font-size:13px;
}
.login-card input {
  background:#1a1a28; border:1px solid #2a2a3a; border-radius:8px;
  color:#e0e0e0; padding:9px 14px; width:220px; text-align:center; font-size:13px;
}
.login-card button {
  margin-left:6px; padding:9px 18px; background:#51cf66; color:#000;
  border:none; border-radius:8px; font-weight:600; cursor:pointer;
}
.login-card .manual-btn {
  margin-top:14px; padding:8px 18px; background:#1a1a28; color:#ccc;
  border:1px solid #2a2a3a; border-radius:8px; cursor:pointer; font-size:12px;
}

.loading { display:flex; align-items:center; justify-content:center; height:calc(100vh - 110px); flex-direction:column; gap:14px; }
.spinner { width:32px; height:32px; border:3px solid #1e1e2e; border-top-color:#7c3aed; border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading span { font-size:13px; color:#555; }
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:16px;">
    <h1>NIFTY VIX RANGE</h1>
    <span class="live-badge"><span class="dot"></span>LIVE</span>
  </div>
  <div class="topbar-right">
    <span><span class="lbl">Spot</span> <span class="spot-val" id="hSpot">—</span> <span id="hChg"></span></span>
    <span><span class="lbl">VIX</span> <span class="vix-val" id="hVix">—</span></span>
    <span><span class="lbl">DTE</span> <span class="dte-val" id="hDte">—</span></span>
  </div>
</div>

<div class="info-strip">
  <span style="display:flex;align-items:center;gap:6px;"><span style="width:14px;height:0;border-top:2.5px solid #2ecc71;display:inline-block;"></span> Spot Price</span>
  <span style="display:flex;align-items:center;gap:6px;"><span style="width:14px;height:0;border-top:2px dashed #ff6b6b;display:inline-block;"></span> 1σ Range (68%)</span>
  <span style="display:flex;align-items:center;gap:6px;"><span style="width:14px;height:0;border-top:2px dashed #4dabf7;display:inline-block;"></span> 2σ Range (95%)</span>
  <span style="display:flex;align-items:center;gap:6px;"><span style="width:14px;height:0;border-top:2px dashed #b197fc;display:inline-block;"></span> 3σ Range (99.7%)</span>
  <span style="margin-left:auto;color:#444;">9:15 AM — 3:30 PM IST</span>
</div>

<div id="app">
  <div class="loading"><div class="spinner"></div><span>Connecting to market feed...</span></div>
</div>

<script>
// ===========================
// CROSSHAIR PLUGIN
// ===========================
const crosshairPlugin = {
  id: 'crosshair',
  afterDraw(chart) {
    if (chart._active && chart._active.length) {
      const activePoint = chart._active[0];
      const ctx = chart.ctx;
      const x = activePoint.element.x;
      const topY = chart.scales.y.top;
      const bottomY = chart.scales.y.bottom;

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x, topY);
      ctx.lineTo(x, bottomY);
      ctx.lineWidth = 1;
      ctx.strokeStyle = '#ffffff30';
      ctx.setLineDash([4, 3]);
      ctx.stroke();
      ctx.restore();
    }
  }
};
Chart.register(crosshairPlugin);

// ===========================
// CONFIG
// ===========================
const API_URL = '/api/range';
const HISTORY_URL = '/api/history';
const MAX_POINTS = 22500;

let chartData = {
  labels: [], spot: [],
  sd1U: [], sd1L: [],
  sd2U: [], sd2L: [],
  sd3U: [], sd3L: [],
};
let rangeChart = null;
let MANUAL_MODE = false;
let manualData = { nifty: 24780.50, vix: 21.14, dte: 27 };

// ===========================
// FETCH
// ===========================
async function fetchData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    if (res.status === 401 || !data.success) {
      if (data.loginUrl) { showLogin(); return null; }
      throw new Error(data.error);
    }
    return data;
  } catch (err) {
    MANUAL_MODE = true;
    return calcManual(manualData.nifty, manualData.vix, manualData.dte);
  }
}

async function fetchHistory() {
  try {
    const res = await fetch(HISTORY_URL);
    const data = await res.json();
    if (data.success && data.ticks && data.ticks.length > 0) {
      return data.ticks;
    }
  } catch (err) {
    console.log('No history available');
  }
  return [];
}

function showLogin() {
  document.getElementById('app').innerHTML = `
    <div class="center-box"><div class="login-card">
      <div style="font-size:36px;margin-bottom:10px;">🔐</div>
      <h2>Upstox Login Required</h2>
      <p>1. Click Login → 2. Upstox Login → 3. Copy code → 4. Paste below</p>
      <a class="btn" href="/login">LOGIN TO UPSTOX</a>
      <div style="margin-top:14px;">
        <input type="text" id="auth-code" placeholder="Paste auth code">
        <button onclick="submitCode()">SUBMIT</button>
      </div>
      <div style="margin-top:16px;border-top:1px solid #1e1e2e;padding-top:14px;">
        <button class="manual-btn" onclick="goManual()">⚡ MANUAL MODE</button>
      </div>
    </div></div>`;
}

function submitCode() {
  const c = document.getElementById('auth-code').value.trim();
  if (c) window.location.href = '/auth?code=' + c;
}

function goManual() {
  MANUAL_MODE = true;
  showChartArea();
  const d = calcManual(manualData.nifty, manualData.vix, manualData.dte);
  addTick(d.market.nifty, d.market.vix, d.market.change, d.market.pctChange, d.config.dte,
    d.ranges.sd1.upper, d.ranges.sd1.lower, d.ranges.sd2.upper, d.ranges.sd2.lower,
    d.ranges.sd3.upper, d.ranges.sd3.lower);
  updateHeader(d.market.nifty, d.market.vix, d.market.change, d.market.pctChange, d.config.dte);
  updateChart();
}

function calcManual(nifty, vix, dte) {
  const av = vix / 100, tf = Math.sqrt(dte / 365);
  const m1 = nifty * av * tf, m2 = m1 * 2, m3 = m1 * 3;
  return {
    success: true, timestamp: new Date().toISOString(), manual: true,
    market: { nifty, change: 0, pctChange: 0, vix, vixChange: 0 },
    config: { dte },
    ranges: {
      daily: { points: 0 },
      sd1: { points:+m1.toFixed(2), upper:+(nifty+m1).toFixed(2), lower:+(nifty-m1).toFixed(2), lowerStrike:0, upperStrike:0, prob:68.27 },
      sd2: { points:+m2.toFixed(2), upper:+(nifty+m2).toFixed(2), lower:+(nifty-m2).toFixed(2), lowerStrike:0, upperStrike:0, prob:95.45 },
      sd3: { points:+m3.toFixed(2), upper:+(nifty+m3).toFixed(2), lower:+(nifty-m3).toFixed(2), lowerStrike:0, upperStrike:0, prob:99.73 },
    },
  };
}

// ===========================
// CHART AREA
// ===========================
function showChartArea() {
  document.getElementById('app').innerHTML = `
    <div class="chart-container">
      <div class="hover-info" id="hoverInfo">
        <div class="hi-time" id="hiTime"></div>
        <div class="hi-row"><span class="hi-label">Spot</span><span class="hi-val" id="hiSpot" style="color:#2ecc71"></span></div>
        <div class="hi-row"><span class="hi-label">1σ Upper</span><span class="hi-val" id="hi1U" style="color:#ff6b6b"></span></div>
        <div class="hi-row"><span class="hi-label">1σ Lower</span><span class="hi-val" id="hi1L" style="color:#ff6b6b"></span></div>
        <div class="hi-row"><span class="hi-label">2σ Upper</span><span class="hi-val" id="hi2U" style="color:#4dabf7"></span></div>
        <div class="hi-row"><span class="hi-label">2σ Lower</span><span class="hi-val" id="hi2L" style="color:#4dabf7"></span></div>
        <div class="hi-row"><span class="hi-label">3σ Upper</span><span class="hi-val" id="hi3U" style="color:#b197fc"></span></div>
        <div class="hi-row"><span class="hi-label">3σ Lower</span><span class="hi-val" id="hi3L" style="color:#b197fc"></span></div>
      </div>
      <canvas id="rangeChart"></canvas>
    </div>`;
}

// ===========================
// DATA MANAGEMENT
// ===========================
const fmtIN = n => Number(n).toLocaleString('en-IN', { maximumFractionDigits: 1 });

function addTick(spot, vix, chg, pct, dte, sd1U, sd1L, sd2U, sd2L, sd3U, sd3L, timeLabel) {
  const t = timeLabel || new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false });
  chartData.labels.push(t);
  chartData.spot.push(spot);
  chartData.sd1U.push(sd1U); chartData.sd1L.push(sd1L);
  chartData.sd2U.push(sd2U); chartData.sd2L.push(sd2L);
  chartData.sd3U.push(sd3U); chartData.sd3L.push(sd3L);

  if (chartData.labels.length > MAX_POINTS) {
    Object.keys(chartData).forEach(k => chartData[k].shift());
  }
}

function loadHistory(ticks) {
  ticks.forEach(tk => {
    addTick(tk.spot, tk.vix, tk.chg, tk.pct, tk.dte,
      tk.sd1U, tk.sd1L, tk.sd2U, tk.sd2L, tk.sd3U, tk.sd3L, tk.t);
  });
}

function processSSE(d) {
  addTick(d.market.nifty, d.market.vix, d.market.change, d.market.pctChange, d.config.dte,
    d.ranges.sd1.upper, d.ranges.sd1.lower, d.ranges.sd2.upper, d.ranges.sd2.lower,
    d.ranges.sd3.upper, d.ranges.sd3.lower);
  updateHeader(d.market.nifty, d.market.vix, d.market.change, d.market.pctChange, d.config.dte);
  updateChart();
}

function updateHeader(spot, vix, chg, pct, dte) {
  document.getElementById('hSpot').textContent = fmtIN(spot);
  const el = document.getElementById('hChg');
  const up = pct >= 0;
  el.className = up ? 'chg-up' : 'chg-dn';
  el.textContent = `${up ? '▲' : '▼'} ${Math.abs(chg).toFixed(1)} (${pct >= 0 ? '+' : ''}${pct}%)`;
  document.getElementById('hVix').textContent = Number(vix).toFixed(2);
  document.getElementById('hDte').textContent = dte;
}

// ===========================
// CHART
// ===========================
function updateChart() {
  const ctx = document.getElementById('rangeChart');
  if (!ctx) return;

  if (rangeChart) {
    rangeChart.data.labels = chartData.labels;
    rangeChart.data.datasets[0].data = chartData.spot;
    rangeChart.data.datasets[1].data = chartData.sd1U;
    rangeChart.data.datasets[2].data = chartData.sd1L;
    rangeChart.data.datasets[3].data = chartData.sd2U;
    rangeChart.data.datasets[4].data = chartData.sd2L;
    rangeChart.data.datasets[5].data = chartData.sd3U;
    rangeChart.data.datasets[6].data = chartData.sd3L;
    rangeChart.update('none');
    return;
  }

  const mkDS = (label, color, width, dash) => ({
    label, data: [],
    borderColor: color, borderWidth: width,
    borderDash: dash || [],
    pointRadius: 0, pointHoverRadius: 5,
    pointHoverBackgroundColor: color,
    pointHoverBorderColor: '#fff',
    pointHoverBorderWidth: 2,
    tension: 0.1, fill: false,
  });

  rangeChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: chartData.labels,
      datasets: [
        { ...mkDS('Spot', '#2ecc71', 2.5), data: chartData.spot },
        { ...mkDS('1σ Upper', '#ff6b6b', 1.3, [6,4]), data: chartData.sd1U },
        { ...mkDS('1σ Lower', '#ff6b6b', 1.3, [6,4]), data: chartData.sd1L },
        { ...mkDS('2σ Upper', '#4dabf7', 1, [4,4]), data: chartData.sd2U },
        { ...mkDS('2σ Lower', '#4dabf7', 1, [4,4]), data: chartData.sd2L },
        { ...mkDS('3σ Upper', '#b197fc', 0.8, [2,4]), data: chartData.sd3U },
        { ...mkDS('3σ Lower', '#b197fc', 0.8, [2,4]), data: chartData.sd3L },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      onHover: (event, elements, chart) => {
        const box = document.getElementById('hoverInfo');
        if (!elements || !elements.length) {
          box.style.display = 'none';
          return;
        }
        const idx = elements[0].index;
        box.style.display = 'block';
        document.getElementById('hiTime').textContent = '⏱ Time: ' + chartData.labels[idx];
        document.getElementById('hiSpot').textContent = fmtIN(chartData.spot[idx]);
        document.getElementById('hi1U').textContent = fmtIN(chartData.sd1U[idx]);
        document.getElementById('hi1L').textContent = fmtIN(chartData.sd1L[idx]);
        document.getElementById('hi2U').textContent = fmtIN(chartData.sd2U[idx]);
        document.getElementById('hi2L').textContent = fmtIN(chartData.sd2L[idx]);
        document.getElementById('hi3U').textContent = fmtIN(chartData.sd3U[idx]);
        document.getElementById('hi3L').textContent = fmtIN(chartData.sd3L[idx]);
      },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false },
      },
      scales: {
        x: {
          ticks: {
            color: '#444',
            font: { family: 'DM Mono', size: 10 },
            maxTicksLimit: 14,
            maxRotation: 0,
            callback: function(val) {
              const label = this.getLabelForValue(val);
              return label ? label.substring(0, 5) : '';
            }
          },
          grid: { color: '#141420', drawTicks: false },
          border: { color: '#1e1e2e' }
        },
        y: {
          position: 'right',
          ticks: {
            color: '#555',
            font: { family: 'DM Mono', size: 11 },
            padding: 8,
            callback: v => Number(v).toLocaleString('en-IN', { maximumFractionDigits: 0 })
          },
          grid: { color: '#111118', drawTicks: false },
          border: { display: false }
        }
      }
    }
  });
}

// ===========================
// SSE LIVE STREAM
// ===========================
function startLiveStream() {
  const evtSource = new EventSource('/api/stream');
  evtSource.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.success) processSSE(data);
    } catch (err) {
      console.log('Stream parse error:', err);
    }
  };
  evtSource.onerror = () => console.log('Stream disconnected, auto-retrying...');
}

// ===========================
// INIT
// ===========================
async function init() {
  const data = await fetchData();
  if (!data) return;

  showChartArea();

  // 1. Load full day history first
  const history = await fetchHistory();
  if (history.length > 0) {
    console.log(`📊 Loaded ${history.length} historical ticks`);
    loadHistory(history);
    // Update header with last tick
    const last = history[history.length - 1];
    updateHeader(last.spot, last.vix, last.chg, last.pct, last.dte);
    updateChart();
  } else {
    // No history, use current data as first point
    processSSE(data);
  }

  // 2. Connect SSE for live updates
  startLiveStream();
}

init();
</script>
</body>
</html>
