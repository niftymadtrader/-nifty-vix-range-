<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nifty VIX Range Calculator — Live</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06080e;
  --surface: #0d1117;
  --surface2: #131922;
  --border: #1c2432;
  --gold: #f7b731;
  --gold-bg: #f7b73112;
  --green: #26de81;
  --green-bg: #26de8115;
  --red: #fc5c65;
  --red-bg: #fc5c6515;
  --blue: #45aaf2;
  --blue-bg: #45aaf215;
  --purple: #a55eea;
  --purple-bg: #a55eea15;
  --cyan: #2bcbba;
  --text: #e6edf3;
  --text2: #7d8590;
  --text3: #484f58;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
}

.noise {
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.app { max-width: 1080px; margin: 0 auto; padding: 24px 16px; position: relative; z-index: 1; }

/* Header */
.hdr { text-align: center; margin-bottom: 28px; }
.hdr h1 {
  font-size: 26px; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--gold), #ff9f43, var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hdr .sub {
  font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2);
  margin-top: 6px; letter-spacing: 1px;
}
.live-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: var(--green); margin-right: 6px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Top cards */
.top-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.tcard {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 16px; text-align: center;
  transition: border-color 0.3s;
}
.tcard:hover { border-color: var(--gold); }
.tcard .lbl { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
.tcard .val { font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 600; transition: color 0.3s ease; }
.tcard .val.flash { animation: priceFlash 0.5s ease; }
@keyframes priceFlash { 0% { opacity: 0.5; transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
.tcard .chg { font-family: 'DM Mono', monospace; font-size: 11px; margin-top: 4px; }

/* Range Section */
.panel {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 24px; margin-bottom: 16px;
}
.panel-title {
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
  color: var(--gold); letter-spacing: 1.5px; margin-bottom: 18px;
  display: flex; align-items: center; gap: 10px;
}
.panel-title::before {
  content: ''; width: 3px; height: 16px; background: var(--gold); border-radius: 2px;
}

/* Range bars */
.rbar { margin: 14px 0; }
.rbar-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.rbar-head .rname { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2); }
.rbar-head .rpts { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; }
.rbar-track {
  width: 100%; height: 48px; background: #080c14; border-radius: 10px;
  position: relative; overflow: hidden; border: 1px solid var(--border);
}
.rbar-fill {
  position: absolute; top: 0; height: 100%; border-radius: 9px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
  animation: slideIn 0.8s ease-out;
}
@keyframes slideIn { from { transform: scaleX(0); opacity: 0; } to { transform: scaleX(1); opacity: 1; } }
.rbar-center {
  position: absolute; top: -2px; bottom: -2px; width: 2px; left: 50%;
  background: var(--gold); z-index: 2;
}
.rbar-clabel {
  position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
  font-family: 'DM Mono', monospace; font-size: 10px; color: var(--gold);
}
.rbar-prob {
  position: absolute; top: 50%; right: -48px; transform: translateY(-50%);
  font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3);
  writing-mode: vertical-rl;
}

/* Key metrics */
.metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
.mcard {
  background: #080c14; border: 1px solid var(--border); border-radius: 10px;
  padding: 14px; text-align: center;
  transition: transform 0.2s, border-color 0.2s;
}
.mcard:hover { transform: translateY(-2px); border-color: var(--gold); }
.mcard .ml { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
.mcard .mv { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 600; }
.mcard .ms { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); margin-top: 3px; }

/* Strategy cards */
.strats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 14px; }
.scard {
  background: #080c14; border: 1px solid var(--border); border-radius: 12px;
  padding: 18px; transition: border-color 0.2s;
}
.scard:hover { border-color: var(--gold); }
.scard .st { font-size: 14px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.scard .sd { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2); line-height: 1.9; }
.sd .hl { font-weight: 500; }
.sd .strike { color: var(--cyan); }
.sd .good { color: var(--green); }

.tag {
  display: inline-block; padding: 2px 7px; border-radius: 4px;
  font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.5px;
}
.tag-g { background: var(--green-bg); color: var(--green); }
.tag-r { background: var(--red-bg); color: var(--red); }
.tag-b { background: var(--blue-bg); color: var(--blue); }
.tag-y { background: var(--gold-bg); color: var(--gold); }

/* Formula */
.formula {
  background: #060a10; border: 1px dashed var(--border); border-radius: 10px;
  padding: 18px; font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--text2); line-height: 2;
}
.formula .fl { color: var(--gold); font-weight: 500; }
.formula .fn { color: var(--cyan); }
.formula .fw { color: #ff9f43; }

/* Status bar */
.status {
  text-align: center; padding: 12px; font-family: 'DM Mono', monospace;
  font-size: 11px; color: var(--text3); border-top: 1px solid var(--border);
  margin-top: 20px;
}

/* Loading */
.loading {
  text-align: center; padding: 100px 20px;
  font-family: 'DM Mono', monospace; color: var(--text2);
}
.spinner {
  width: 40px; height: 40px; border: 3px solid var(--border);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Error */
.error-box {
  background: var(--red-bg); border: 1px solid #fc5c6530;
  border-radius: 12px; padding: 24px; text-align: center;
  font-family: 'DM Mono', monospace;
}
.error-box h3 { color: var(--red); margin-bottom: 8px; }
.error-box p { color: var(--text2); font-size: 13px; line-height: 1.6; }

/* Manual input */
.manual-input {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center;
}
.manual-input label {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2);
  text-transform: uppercase; letter-spacing: 1px;
}
.manual-input input, .manual-input select {
  background: #080c14; border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
  padding: 8px 12px; width: 130px; text-align: center;
  transition: border-color 0.2s;
}
.manual-input input:focus, .manual-input select:focus {
  outline: none; border-color: var(--gold);
}
.manual-input button {
  background: linear-gradient(135deg, var(--gold), #ff9f43);
  border: none; border-radius: 8px; color: #000; font-family: 'DM Mono', monospace;
  font-size: 12px; font-weight: 600; padding: 9px 20px; cursor: pointer;
  letter-spacing: 0.5px; transition: transform 0.2s;
}
.manual-input button:hover { transform: scale(1.03); }

@media (max-width: 768px) {
  .top-row { grid-template-columns: repeat(2, 1fr); }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .strats { grid-template-columns: 1fr; }
  .hdr h1 { font-size: 20px; }
}
</style>
</head>
<body>
<div class="noise"></div>
<div class="app" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div>Loading market data...</div>
  </div>
</div>

<script>
// ===========================
// CONFIG
// ===========================
const API_URL = '/api/range';       // When running with backend
const REFRESH_INTERVAL = 60000;     // 60 seconds
let refreshTimer = null;

// For OFFLINE / DEMO mode (when backend is not running)
let MANUAL_MODE = false;
let manualData = { nifty: 24780.50, vix: 21.14, dte: 27 };

// ===========================
// FETCH DATA
// ===========================
async function fetchData(expiryDate) {
  try {
    const url = expiryDate ? `${API_URL}?expiry=${expiryDate}` : API_URL;
    const res = await fetch(url);
    const data = await res.json();

    // If not logged in, show login prompt
    if (res.status === 401 || !data.success) {
      if (data.loginUrl) {
        document.getElementById('app').innerHTML = `
          <div class="hdr"><h1>NIFTY VIX RANGE CALCULATOR</h1></div>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center;max-width:600px;margin:40px auto;">
            <div style="font-size:48px;margin-bottom:16px;">🔐</div>
            <h2 style="color:var(--gold);margin-bottom:12px;font-family:'DM Mono',monospace;">Upstox Login Required</h2>
            <p style="color:var(--text2);font-family:'DM Mono',monospace;font-size:13px;line-height:2;">
              Step 1: Click login button below<br>
              Step 2: Login to Upstox (UCC + Password + DOB)<br>
              Step 3: Copy the <b style="color:var(--cyan)">code</b> from redirect URL<br>
              (URL: https://127.0.0.1?code=xxxxx)<br>
              Step 4: Paste code below
            </p>
            <a href="/login" style="display:inline-block;margin:20px 0;padding:12px 32px;background:linear-gradient(135deg,var(--gold),#ff9f43);color:#000;font-family:'DM Mono',monospace;font-weight:600;border-radius:8px;text-decoration:none;font-size:14px;">🔐 LOGIN TO UPSTOX</a>
            <div style="margin-top:20px;">
              <input type="text" id="auth-code" placeholder="Paste auth code here" style="background:#080c14;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;padding:10px 16px;width:300px;text-align:center;font-size:13px;">
              <button onclick="submitCode()" style="margin-left:8px;padding:10px 20px;background:var(--green);color:#000;border:none;border-radius:8px;font-family:'DM Mono',monospace;font-weight:600;cursor:pointer;">SUBMIT</button>
            </div>
            <div style="margin-top:30px;border-top:1px solid var(--border);padding-top:20px;">
              <p style="color:var(--text3);font-size:11px;font-family:'DM Mono',monospace;">Or use Manual Mode:</p>
              <button onclick="goManual()" style="margin-top:8px;padding:8px 20px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;font-family:'DM Mono',monospace;cursor:pointer;">⚡ MANUAL MODE</button>
            </div>
          </div>`;
        return null;
      }
      throw new Error(data.error || 'Unknown error');
    }
    if (data.success) return data;
    throw new Error(data.error || 'Unknown error');
  } catch (err) {
    console.log('Backend unavailable, using manual mode');
    MANUAL_MODE = true;
    return calculateManual(manualData.nifty, manualData.vix, manualData.dte);
  }
}

function submitCode() {
  const code = document.getElementById('auth-code').value.trim();
  if (code) window.location.href = '/auth?code=' + code;
}

function goManual() {
  MANUAL_MODE = true;
  const data = calculateManual(manualData.nifty, manualData.vix, manualData.dte);
  render(data);
}

// Manual calculation (offline mode)
function calculateManual(nifty, vix, dte) {
  const annualVol = vix / 100;
  const tf = Math.sqrt(dte / 365);
  const m1 = nifty * annualVol * tf;
  const m2 = m1 * 2;
  const m3 = m1 * 3;
  const daily = nifty * annualVol / Math.sqrt(365);
  const r50 = v => Math.round(v / 50) * 50;

  return {
    success: true,
    timestamp: new Date().toISOString(),
    manual: true,
    market: { nifty, change: 0, pctChange: 0, vix, vixChange: 0 },
    config: { dte },
    ranges: {
      daily: { points: +daily.toFixed(2), lower: +(nifty-daily).toFixed(2), upper: +(nifty+daily).toFixed(2) },
      sd1: { points: +m1.toFixed(2), lower: +(nifty-m1).toFixed(2), upper: +(nifty+m1).toFixed(2), lowerStrike: r50(nifty-m1), upperStrike: r50(nifty+m1), prob: 68.27 },
      sd2: { points: +m2.toFixed(2), lower: +(nifty-m2).toFixed(2), upper: +(nifty+m2).toFixed(2), lowerStrike: r50(nifty-m2), upperStrike: r50(nifty+m2), prob: 95.45 },
      sd3: { points: +m3.toFixed(2), lower: +(nifty-m3).toFixed(2), upper: +(nifty+m3).toFixed(2), lowerStrike: r50(nifty-m3), upperStrike: r50(nifty+m3), prob: 99.73 },
    },
  };
}

// ===========================
// RENDER
// ===========================
const fmt = n => Number(n).toLocaleString('en-IN', { maximumFractionDigits: 0 });
const fmt2 = n => Number(n).toLocaleString('en-IN', { maximumFractionDigits: 2 });

function render(d) {
  const m = d.market;
  const r = d.ranges;
  const isUp = m.pctChange >= 0;
  const vixHigh = m.vix > 20;
  const moveP = (r.sd1.points / m.nifty * 100).toFixed(2);

  document.getElementById('app').innerHTML = `
    <div class="hdr">
      <h1>NIFTY VIX RANGE CALCULATOR</h1>
      <div class="sub">
        ${d.manual
          ? '⚡ MANUAL MODE — Enter values below'
          : `<span class="live-dot"></span>LIVE STREAMING • Updates every 1 min `
        }
      </div>
    </div>

    <!-- Manual Input -->
    <div class="manual-input">
      <label>Nifty</label>
      <input type="number" id="inp-nifty" value="${m.nifty}" step="0.05">
      <label>VIX</label>
      <input type="number" id="inp-vix" value="${m.vix}" step="0.01">
      <label>DTE</label>
      <input type="number" id="inp-dte" value="${d.config.dte}" min="1" max="90">
      <button onclick="recalculate()">CALCULATE</button>
    </div>

    <!-- Top Cards -->
    <div class="top-row">
      <div class="tcard">
        <div class="lbl">Nifty 50</div>
        <div class="val" style="color:var(--cyan)">${fmt2(m.nifty)}</div>
        <div class="chg" style="color:${isUp?'var(--green)':'var(--red)'}">
          ${isUp?'▲':'▼'} ${fmt2(Math.abs(m.change))} (${m.pctChange >= 0 ? '+' : ''}${fmt2(m.pctChange)}%)
        </div>
      </div>
      <div class="tcard">
        <div class="lbl">India VIX</div>
        <div class="val" style="color:${vixHigh?'var(--red)':m.vix>15?'var(--gold)':'var(--green)'}">${fmt2(m.vix)}</div>
        <div class="chg" style="color:var(--text2)">${vixHigh ? '⚠ High Fear' : m.vix > 15 ? 'Moderate' : '✅ Low Vol'}</div>
      </div>
      <div class="tcard">
        <div class="lbl">Days to Expiry</div>
        <div class="val" style="color:var(--gold)">${d.config.dte}</div>
        <div class="chg" style="color:var(--text2)">${Math.round(d.config.dte * 0.7)} trading days</div>
      </div>
      <div class="tcard">
        <div class="lbl">1σ Expected Move</div>
        <div class="val" style="color:var(--purple)">±${fmt(r.sd1.points)}</div>
        <div class="chg" style="color:var(--text2)">${moveP}% from spot</div>
      </div>
    </div>

    <!-- Range Bands -->
    <div class="panel">
      <div class="panel-title">EXPECTED RANGE BANDS</div>

      <div class="rbar">
        <div class="rbar-head">
          <span class="rname">1σ RANGE — 68.27% Probability</span>
          <span class="rpts" style="color:var(--green)">±${fmt(r.sd1.points)} pts</span>
        </div>
        <div class="rbar-track">
          <div class="rbar-center"></div>
          <div class="rbar-clabel">${fmt2(m.nifty)}</div>
          <div class="rbar-fill" style="left:16%;width:68%;background:linear-gradient(90deg,var(--green-bg),transparent,var(--green-bg));">
            <span style="color:var(--green)">${fmt(r.sd1.lower)}</span>
            <span style="color:var(--text3);font-size:10px;">68.27%</span>
            <span style="color:var(--green)">${fmt(r.sd1.upper)}</span>
          </div>
        </div>
      </div>

      <div class="rbar">
        <div class="rbar-head">
          <span class="rname">2σ RANGE — 95.45% Probability</span>
          <span class="rpts" style="color:var(--blue)">±${fmt(r.sd2.points)} pts</span>
        </div>
        <div class="rbar-track">
          <div class="rbar-center"></div>
          <div class="rbar-fill" style="left:5%;width:90%;background:linear-gradient(90deg,var(--blue-bg),transparent,var(--blue-bg));">
            <span style="color:var(--blue)">${fmt(r.sd2.lower)}</span>
            <span style="color:var(--text3);font-size:10px;">95.45%</span>
            <span style="color:var(--blue)">${fmt(r.sd2.upper)}</span>
          </div>
        </div>
      </div>

      <div class="rbar">
        <div class="rbar-head">
          <span class="rname">3σ RANGE — 99.73% Probability</span>
          <span class="rpts" style="color:var(--purple)">±${fmt(r.sd3.points)} pts</span>
        </div>
        <div class="rbar-track">
          <div class="rbar-center"></div>
          <div class="rbar-fill" style="left:2%;width:96%;background:linear-gradient(90deg,var(--purple-bg),transparent,var(--purple-bg));">
            <span style="color:var(--purple)">${fmt(r.sd3.lower)}</span>
            <span style="color:var(--text3);font-size:10px;">99.73%</span>
            <span style="color:var(--purple)">${fmt(r.sd3.upper)}</span>
          </div>
        </div>
      </div>

      <!-- Key Metrics -->
      <div class="metrics">
        <div class="mcard">
          <div class="ml">Daily Move</div>
          <div class="mv" style="color:var(--cyan)">±${fmt(r.daily.points)}</div>
          <div class="ms">points/day</div>
        </div>
        <div class="mcard">
          <div class="ml">1σ PE Sell Strike</div>
          <div class="mv" style="color:var(--green)">${fmt(r.sd1.lowerStrike)}</div>
          <div class="ms">support level</div>
        </div>
        <div class="mcard">
          <div class="ml">1σ CE Sell Strike</div>
          <div class="mv" style="color:var(--red)">${fmt(r.sd1.upperStrike)}</div>
          <div class="ms">resistance level</div>
        </div>
        <div class="mcard">
          <div class="ml">2σ Lower Strike</div>
          <div class="mv" style="color:var(--blue)">${fmt(r.sd2.lowerStrike)}</div>
          <div class="ms">97.7% safe PE sell</div>
        </div>
        <div class="mcard">
          <div class="ml">ATM Strike</div>
          <div class="mv" style="color:var(--gold)">${fmt(Math.round(m.nifty / 50) * 50)}</div>
          <div class="ms">nearest ₹50</div>
        </div>
        <div class="mcard">
          <div class="ml">2σ Upper Strike</div>
          <div class="mv" style="color:var(--blue)">${fmt(r.sd2.upperStrike)}</div>
          <div class="ms">97.7% safe CE sell</div>
        </div>
      </div>
    </div>

    <!-- Strategy -->
    <div class="panel">
      <div class="panel-title">OPTIONS STRATEGY IDEAS ${vixHigh ? '(HIGH VIX = PREMIUM RICH)' : ''}</div>
      <div class="strats">
        <div class="scard">
          <div class="st" style="color:var(--green)">🛡️ Iron Condor <span class="tag tag-y">HIGH PROB</span></div>
          <div class="sd">
            <span class="hl">Sell:</span> <span class="strike">${fmt(r.sd1.upperStrike)} CE</span> + <span class="strike">${fmt(r.sd1.lowerStrike)} PE</span><br>
            <span class="hl">Buy:</span> <span class="strike">${fmt(r.sd2.upperStrike)} CE</span> + <span class="strike">${fmt(r.sd2.lowerStrike)} PE</span><br>
            <span class="hl">Win:</span> <span class="good">~68%</span> | Defined risk
          </div>
        </div>
        <div class="scard">
          <div class="st" style="color:var(--blue)">📐 Short Strangle <span class="tag tag-b">MODERATE</span></div>
          <div class="sd">
            <span class="hl">Sell:</span> <span class="strike">${fmt(r.sd1.upperStrike)} CE</span> + <span class="strike">${fmt(r.sd1.lowerStrike)} PE</span><br>
            <span class="hl">Win:</span> <span class="good">~68%</span> | Margin heavy<br>
            <span class="hl">Adjust:</span> Roll at ±1σ breach
          </div>
        </div>
        <div class="scard">
          <div class="st" style="color:var(--cyan)">🔒 2σ Credit Spread <span class="tag tag-g">SAFE</span></div>
          <div class="sd">
            <span class="hl">Bull Put:</span> Sell <span class="strike">${fmt(r.sd2.lowerStrike)} PE</span> / Buy <span class="strike">${fmt(r.sd2.lowerStrike - 200)} PE</span><br>
            <span class="hl">Bear Call:</span> Sell <span class="strike">${fmt(r.sd2.upperStrike)} CE</span> / Buy <span class="strike">${fmt(r.sd2.upperStrike + 200)} CE</span><br>
            <span class="hl">Win:</span> <span class="good">~95%</span> | Risk defined
          </div>
        </div>
        <div class="scard">
          <div class="st" style="color:var(--purple)">⚡ ATM Straddle <span class="tag tag-r">AGGRESSIVE</span></div>
          <div class="sd">
            <span class="hl">Sell:</span> <span class="strike">${fmt(Math.round(m.nifty / 50) * 50)} CE</span> + <span class="strike">${fmt(Math.round(m.nifty / 50) * 50)} PE</span><br>
            <span class="hl">Max Profit:</span> Full premium if within range<br>
            <span class="hl">Risk:</span> ⚠ Unlimited, add wings
          </div>
        </div>
      </div>
    </div>

    <!-- Formula -->
    <div class="panel">
      <div class="panel-title">CALCULATION FORMULA</div>
      <div class="formula">
        <span class="fl">Expected Move</span> = Spot × (VIX ÷ 100) × √(DTE ÷ 365)<br><br>
        <span class="fl">1σ Move</span> = <span class="fn">${fmt2(m.nifty)}</span> × (<span class="fn">${fmt2(m.vix)}</span> ÷ 100) × √(<span class="fn">${d.config.dte}</span> ÷ 365)<br>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;= <span class="fn">${fmt2(m.nifty)}</span> × <span class="fn">${(m.vix/100).toFixed(4)}</span> × <span class="fn">${Math.sqrt(d.config.dte/365).toFixed(4)}</span><br>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;= <span class="fn" style="color:var(--gold);font-size:13px">±${fmt2(r.sd1.points)} points</span><br><br>
        <span class="fl">1σ Range</span> = [<span class="fn">${fmt2(r.sd1.lower)}</span> — <span class="fn">${fmt2(r.sd1.upper)}</span>] → 68.27%<br>
        <span class="fl">2σ Range</span> = [<span class="fn">${fmt2(r.sd2.lower)}</span> — <span class="fn">${fmt2(r.sd2.upper)}</span>] → 95.45%<br>
        <span class="fl">3σ Range</span> = [<span class="fn">${fmt2(r.sd3.lower)}</span> — <span class="fn">${fmt2(r.sd3.upper)}</span>] → 99.73%<br><br>
        <span class="fw">⚠ DTE = ${d.config.dte} (inclusive counting) | VIX assumes normal distribution | Fat tails not captured</span>
      </div>
    </div>

    <div class="status">
      ⚠ Educational purpose only • Not financial advice • ${d.source || 'Manual Mode'} • Last tick: ${new Date(d.timestamp).toLocaleString('en-IN')}
    </div>
  `;
}

// ===========================
// RECALCULATE (Manual Mode)
// ===========================
function recalculate() {
  const nifty = parseFloat(document.getElementById('inp-nifty').value);
  const vix = parseFloat(document.getElementById('inp-vix').value);
  const dte = parseInt(document.getElementById('inp-dte').value);

  if (isNaN(nifty) || isNaN(vix) || isNaN(dte)) return alert('Please enter valid numbers');
  if (dte < 1 || dte > 90) return alert('DTE must be between 1 and 90');

  manualData = { nifty, vix, dte };
  const data = calculateManual(nifty, vix, dte);
  render(data);
}

// ===========================
// INIT
// ===========================
async function init() {
  const data = await fetchData();
  if (!data) return; // Login prompt shown

  render(data);

  // 🔴 OLD: Polling every 60s
  // 🟢 NEW: SSE Live Stream — instant updates!
  startLiveStream();
}

function startLiveStream() {
  const evtSource = new EventSource('/api/stream');

  evtSource.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.success) {
        render(data);
      }
    } catch (err) {
      console.log('Stream parse error:', err);
    }
  };

  evtSource.onerror = (err) => {
    console.log('Stream disconnected, retrying...');
    // SSE auto-reconnects by default
  };
}

init();
</script>
